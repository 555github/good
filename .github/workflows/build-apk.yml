name: Build ChatImage v3 APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: chatimage-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Apply source fixes
        shell: bash
        run: |
          python scripts/fix_sources.py

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Install Gradle 8.11.1
        shell: bash
        run: |
          wget -q \
            https://services.gradle.org/distributions/gradle-8.11.1-bin.zip \
            -O gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.11.1/bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        shell: bash
        run: |
          java -version
          python --version
          gradle --version
          sdkmanager --version

      - name: Compile Kotlin
        shell: bash
        run: |
          gradle :app:compileDebugKotlin \
            --no-daemon \
            --stacktrace \
            --console=plain

      - name: Build debug APK
        shell: bash
        run: |
          gradle :app:assembleDebug \
            --no-daemon \
            --stacktrace \
            --console=plain

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: ChatImage-v3-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
