name: Build ChatImage APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Gradle
        shell: bash
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip
          unzip -q gradle-8.11.1-bin.zip
          echo "$PWD/gradle-8.11.1/bin" >> "$GITHUB_PATH"

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --console=plain

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: ChatImage-v2-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
